services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "PramosClearing_Pass123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "PramosClearing_Pass123!",
          "-Q", "SELECT 1",
          "-No",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  market-service:
    build:
      context: ./services/market-service
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PramosClearing_Market;User Id=sa;Password=PramosClearing_Pass123!;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PramosClearing_Users;User Id=sa;Password=PramosClearing_Pass123!;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
